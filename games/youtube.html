<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Unity WebGL Player | Youtubers Life</title>
    <base href="https://cdn.jsdelivr.net/gh/reeyuki/ytlifeomg@main/" />
    <link rel="shortcut icon" href="TemplateData/favicon.ico" />
    <link rel="stylesheet" href="TemplateData/style.css" />
    <link rel="manifest" href="manifest.webmanifest" />
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" width="960" height="600" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"></div>
    </div>

    <script>
      window.addEventListener("load", function () {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker
            .register("ServiceWorker.js")
            .catch(function (err) {
              console.warn("Service worker registration failed:", err);
            });
        }
      });

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length
            ? "block"
            : "none";
        }
        var div = document.createElement("div");
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type === "error") {
          div.style = "background: red; padding: 10px;";
        } else {
          if (type === "warning") {
            div.style = "background: yellow; padding: 10px;";
          }
          setTimeout(function () {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      function getParts(baseName, partCount) {
        var parts = [];
        for (var i = 0; i < partCount; i += 1) {
          parts.push(
            "Build/" + baseName + ".part" + String(i).padStart(3, "0"),
          );
        }
        return parts;
      }

      async function mergeFiles(fileParts) {
        var responses = await Promise.all(
          fileParts.map(function (url) {
            return fetch(url).then(function (response) {
              if (!response.ok) {
                throw new Error(
                  "Failed to fetch " +
                    url +
                    ": " +
                    response.status +
                    " " +
                    response.statusText,
                );
              }
              return response.arrayBuffer();
            });
          }),
        );
        return URL.createObjectURL(new Blob(responses));
      }

      (async function () {
        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
          var meta = document.createElement("meta");
          meta.name = "viewport";
          meta.content =
            "width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes";
          document.getElementsByTagName("head")[0].appendChild(meta);

          canvas.style.width = "100%";
          canvas.style.height = "100%";
          canvas.style.position = "fixed";
          document.body.style.textAlign = "left";
        }

        loadingBar.style.display = "block";

        var buildUrl = "Build";
        var loaderUrl = buildUrl + "/yt.loader.js";

        var dataUrl = await mergeFiles(getParts("yt.data", 26));
        var wasmUrl = await mergeFiles(getParts("yt.wasm", 3));

        var config = {
          dataUrl: dataUrl,
          frameworkUrl: buildUrl + "/yt.framework.js",
          codeUrl: wasmUrl,
          streamingAssetsUrl: "StreamingAssets",
          companyName: "U-Play online",
          productName: "Youtubers Life",
          productVersion: "1.6.3e",
          showBanner: unityShowBanner,
        };

        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = function () {
          createUnityInstance(canvas, config, function (progress) {
            progressBarFull.style.width = 100 * progress + "%";
          })
            .then(function () {
              loadingBar.style.display = "none";
            })
            .catch(function (message) {
              alert(message);
            });
        };
        script.onerror = function () {
          unityShowBanner(
            "Unable to load Unity loader script: " + loaderUrl,
            "error",
          );
        };
        document.body.appendChild(script);
      })().catch(function (err) {
        console.error(err);
        unityShowBanner("Startup failed: " + err.message, "error");
      });
    </script>
  </body>
</html>
